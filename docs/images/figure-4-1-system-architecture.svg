<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="920" viewBox="0 0 1100 920" role="img" aria-label="Figure 4.1 System Architecture Diagram">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#124e66"/>
      <stop offset="100%" style="stop-color:#0a2338"/>
    </linearGradient>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#124e66"/>
    </marker>
  </defs>

  <rect x="30" y="18" width="1040" height="64" rx="10" fill="url(#hdr)" filter="url(#sh)"/>
  <text x="550" y="48" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Figure 4.1 - High-Level Three-Tier System Architecture</text>
  <text x="550" y="68" text-anchor="middle" fill="#d4e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12">GMB HR Recruitment System</text>

  <text x="550" y="108" text-anchor="middle" fill="#124e66" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">External Users and Services</text>

  <rect x="50" y="120" width="140" height="52" rx="8" fill="#e8f4f8" stroke="#124e66" stroke-width="1.5"/>
  <text x="120" y="143" text-anchor="middle" fill="#124e66" font-size="11" font-weight="600">Job Applicant</text>
  <text x="120" y="160" text-anchor="middle" fill="#666666" font-size="9">Public portal</text>

  <rect x="210" y="120" width="140" height="52" rx="8" fill="#e8f4f8" stroke="#124e66" stroke-width="1.5"/>
  <text x="280" y="143" text-anchor="middle" fill="#124e66" font-size="11" font-weight="600">HR Manager / Staff</text>
  <text x="280" y="160" text-anchor="middle" fill="#666666" font-size="9">/hr dashboard</text>

  <rect x="370" y="120" width="140" height="52" rx="8" fill="#fff8e6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="440" y="143" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="600">External Interviewer</text>
  <text x="440" y="160" text-anchor="middle" fill="#666666" font-size="9">Shared link + code</text>

  <rect x="530" y="120" width="120" height="52" rx="8" fill="#e8f4f8" stroke="#124e66" stroke-width="1.5"/>
  <text x="590" y="143" text-anchor="middle" fill="#124e66" font-size="11" font-weight="600">Audit Officer</text>
  <text x="590" y="160" text-anchor="middle" fill="#666666" font-size="9">/audit</text>

  <rect x="670" y="120" width="150" height="52" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="745" y="143" text-anchor="middle" fill="#555555" font-size="11" font-weight="600">SMTP Email Server</text>
  <text x="745" y="160" text-anchor="middle" fill="#666666" font-size="9">Gmail / institutional</text>

  <rect x="840" y="120" width="210" height="52" rx="8" fill="#f0f0f0" stroke="#888888" stroke-width="1.5"/>
  <text x="945" y="143" text-anchor="middle" fill="#555555" font-size="11" font-weight="600">Web Browser (Client)</text>
  <text x="945" y="160" text-anchor="middle" fill="#666666" font-size="9">Chrome, Edge, Firefox</text>

  <line x1="120" y1="172" x2="120" y2="210" stroke="#124e66" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="280" y1="172" x2="280" y2="210" stroke="#124e66" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="440" y1="172" x2="440" y2="210" stroke="#124e66" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="590" y1="172" x2="590" y2="210" stroke="#124e66" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="40" y="210" width="1020" height="200" rx="12" fill="#f0f7fa" stroke="#124e66" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="40" y="210" width="1020" height="36" rx="12" fill="#124e66"/>
  <rect x="40" y="234" width="1020" height="12" fill="#124e66"/>
  <text x="60" y="234" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">TIER 1 - PRESENTATION LAYER</text>
  <text x="780" y="234" fill="#d4e8f0" font-size="11">Jinja2 Templates + CSS + JavaScript</text>

  <rect x="60" y="260" width="155" height="62" rx="6" fill="#ffffff" stroke="#124e66"/>
  <text x="137" y="282" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">index.html</text>
  <text x="137" y="298" text-anchor="middle" fill="#666666" font-size="9">apply.html</text>
  <text x="137" y="312" text-anchor="middle" fill="#888888" font-size="8">Applicant Portal</text>

  <rect x="230" y="260" width="155" height="62" rx="6" fill="#ffffff" stroke="#124e66"/>
  <text x="307" y="282" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">login.html</text>
  <text x="307" y="298" text-anchor="middle" fill="#666666" font-size="9">hr_dashboard.html</text>
  <text x="307" y="312" text-anchor="middle" fill="#888888" font-size="8">HR Portal</text>

  <rect x="400" y="260" width="175" height="62" rx="6" fill="#fff8e6" stroke="#f39c12"/>
  <text x="487" y="282" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="600">interviewer_join.html</text>
  <text x="487" y="298" text-anchor="middle" fill="#666666" font-size="9">interviewer_dashboard.html</text>
  <text x="487" y="312" text-anchor="middle" fill="#888888" font-size="8">Interviewer Portal</text>

  <rect x="590" y="260" width="130" height="62" rx="6" fill="#ffffff" stroke="#124e66"/>
  <text x="655" y="288" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">audit_dashboard.html</text>
  <text x="655" y="312" text-anchor="middle" fill="#888888" font-size="8">Audit Portal</text>

  <rect x="735" y="260" width="300" height="62" rx="6" fill="#ffffff" stroke="#124e66"/>
  <text x="885" y="282" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">static/style.css, gmb-logo.svg</text>
  <text x="885" y="298" text-anchor="middle" fill="#666666" font-size="9">Modals, Fetch API, 5s polling (interviewer)</text>
  <text x="885" y="312" text-anchor="middle" fill="#888888" font-size="8">GMB branding (#124e66, #f39c12)</text>

  <rect x="60" y="335" width="975" height="58" rx="6" fill="#ffffff" stroke="#d0d8e0"/>
  <text x="80" y="358" fill="#124e66" font-size="11" font-weight="600">Client-side behaviour:</text>
  <text x="80" y="378" fill="#555555" font-size="10">Interview modals, mark tables, AJAX to JSON endpoints, session cookies, notification toasts</text>

  <line x1="550" y1="410" x2="550" y2="440" stroke="#124e66" stroke-width="2" marker-end="url(#ar)"/>
  <text x="560" y="428" fill="#124e66" font-size="10">HTTP Requests (GET / POST)</text>

  <rect x="40" y="440" width="1020" height="280" rx="12" fill="#f8f9fb" stroke="#0a2338" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="40" y="440" width="1020" height="36" rx="12" fill="#0a2338"/>
  <rect x="40" y="464" width="1020" height="12" fill="#0a2338"/>
  <text x="60" y="464" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">TIER 2 - APPLICATION LAYER (Flask / Python 3.11)</text>
  <text x="780" y="464" fill="#d4e8f0" font-size="11">app.py - Monolithic Web Server</text>

  <rect x="60" y="490" width="300" height="210" rx="8" fill="#ffffff" stroke="#124e66" stroke-width="1.5"/>
  <text x="210" y="512" text-anchor="middle" fill="#124e66" font-size="12" font-weight="700">Route Handlers (app.py)</text>
  <text x="75" y="532" fill="#555555" font-size="10">/portal, /apply - applications</text>
  <text x="75" y="550" fill="#555555" font-size="10">/login, /hr - dashboard and JSON APIs</text>
  <text x="75" y="568" fill="#555555" font-size="10">/interviewer/join, /dashboard</text>
  <text x="75" y="586" fill="#555555" font-size="10">/hr/interviews/start, score, screen</text>
  <text x="75" y="604" fill="#555555" font-size="10">/audit - activity review</text>
  <text x="75" y="622" fill="#555555" font-size="10">/hr/settings - branding and SMTP</text>
  <text x="75" y="648" fill="#124e66" font-size="10" font-weight="600">Permission helpers:</text>
  <text x="75" y="666" fill="#666666" font-size="9">_require_hr_api, _require_scoring_permission</text>
  <text x="75" y="682" fill="#666666" font-size="9">_require_screening_permission</text>

  <rect x="380" y="490" width="300" height="210" rx="8" fill="#ffffff" stroke="#f39c12" stroke-width="1.5"/>
  <text x="530" y="512" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">Business Logic Modules</text>
  <text x="395" y="532" fill="#555555" font-size="10">Authentication and session management</text>
  <text x="395" y="550" fill="#555555" font-size="10">Job CRUD and deadline state</text>
  <text x="395" y="568" fill="#555555" font-size="10">CV screening orchestration</text>
  <text x="395" y="586" fill="#555555" font-size="10">Interview scheduling and email</text>
  <text x="395" y="604" fill="#f39c12" font-size="10" font-weight="600">_set_active_interview (sequential)</text>
  <text x="395" y="622" fill="#555555" font-size="10">Multi-evaluator scoring and averaging</text>
  <text x="395" y="640" fill="#555555" font-size="10">Screening guards and selection</text>
  <text x="395" y="658" fill="#555555" font-size="10">Interviewer panel and access codes</text>
  <text x="395" y="676" fill="#555555" font-size="10">Activity logging and enrichment</text>

  <rect x="700" y="490" width="340" height="210" rx="8" fill="#ffffff" stroke="#124e66" stroke-width="1.5"/>
  <text x="870" y="512" text-anchor="middle" fill="#124e66" font-size="12" font-weight="700">services/ Package</text>
  <rect x="715" y="525" width="310" height="42" rx="5" fill="#f0f7fa" stroke="#124e66"/>
  <text x="870" y="545" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">cv_scoring.py</text>
  <text x="870" y="560" text-anchor="middle" fill="#666666" font-size="9">TF-IDF, cosine similarity, skill matching</text>
  <rect x="715" y="575" width="310" height="42" rx="5" fill="#f0f7fa" stroke="#124e66"/>
  <text x="870" y="595" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">document_validation.py</text>
  <text x="870" y="610" text-anchor="middle" fill="#666666" font-size="9">CV/cert validation against form data</text>
  <rect x="715" y="625" width="310" height="42" rx="5" fill="#f0f7fa" stroke="#124e66"/>
  <text x="870" y="645" text-anchor="middle" fill="#124e66" font-size="10" font-weight="600">Email helpers (app.py + SMTP)</text>
  <text x="870" y="660" text-anchor="middle" fill="#666666" font-size="9">HTML emails, logo CID, placeholders</text>
  <text x="715" y="690" fill="#888888" font-size="9">Flask, Werkzeug, scikit-learn, python-docx, pypdf</text>

  <line x1="550" y1="720" x2="550" y2="750" stroke="#124e66" stroke-width="2" marker-end="url(#ar)"/>
  <text x="560" y="738" fill="#124e66" font-size="10">load_all_data() / save_*()</text>

  <rect x="40" y="750" width="1020" height="145" rx="12" fill="#f5f0e8" stroke="#8B7355" stroke-width="2" filter="url(#sh)"/>
  <rect x="40" y="750" width="1020" height="36" rx="12" fill="#8B7355"/>
  <rect x="40" y="774" width="1020" height="12" fill="#8B7355"/>
  <text x="60" y="774" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">TIER 3 - DATA LAYER</text>
  <text x="780" y="774" fill="#f0e6d8" font-size="11">JSON files + File uploads (.env secrets)</text>

  <rect x="60" y="800" width="470" height="78" rx="6" fill="#ffffff" stroke="#8B7355"/>
  <text x="75" y="820" fill="#8B7355" font-size="11" font-weight="700">data/ (JSON persistence)</text>
  <text x="75" y="838" fill="#555555" font-size="9">users.json, jobs.json, applications.json, interviewer_panels.json</text>
  <text x="75" y="854" fill="#555555" font-size="9">settings.json, activity_logs.json, email_history.json</text>
  <text x="75" y="870" fill="#888888" font-size="8">In-memory dicts at runtime - Future: PostgreSQL</text>

  <rect x="550" y="800" width="490" height="78" rx="6" fill="#ffffff" stroke="#8B7355"/>
  <text x="565" y="820" fill="#8B7355" font-size="11" font-weight="700">uploads/ (binary file storage)</text>
  <text x="565" y="838" fill="#555555" font-size="9">CVs (PDF/DOCX), certificates, branding/logo, welcome video</text>
  <text x="565" y="854" fill="#555555" font-size="9">.env: SECRET_KEY, SMTP_HOST, SMTP_USER, SMTP_PASS</text>
  <text x="565" y="870" fill="#888888" font-size="8">File paths stored in application records</text>

  <line x1="745" y1="172" x2="870" y2="440" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ar)"/>
  <text x="820" y="300" fill="#888888" font-size="9">SMTP</text>
</svg>
