<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Application received</title>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>Application received</h1>
        <p>Thank you, <strong>{{ application.name }} {{ application.surname }}</strong>. Your application for <em>{{ job.title }}</em> has been received.</p>
        <p>Reference: <strong>{{ application.id }}</strong></p>
        <p>HR will review submissions after the due date or from the dashboard.</p>
        <p><a href="{{ url_for('applicant_page', application_id=application.id) }}"><i class="fas fa-user"></i> Open applicant page</a></p>
        <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Back to jobs</a>
      </section>
    </main>
  </body>
</html>
