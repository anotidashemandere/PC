<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Set Password - Interviewer Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background: #0d1b2a;
        color: #e0e1dd;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .reset-card {
        background: #1b263b;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border: 1px solid #415a77;
      }
      .reset-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .reset-header h2 {
        color: #f39c12;
        margin: 0 0 10px 0;
        font-size: 24px;
        font-weight: 700;
      }
      .reset-header p {
        color: #a3b18a;
        font-size: 14px;
        margin: 0;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #e0e1dd;
      }
      .form-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 6px;
        border: 1px solid #415a77;
        background: #0d1b2a;
        color: white;
        font-size: 14px;
        box-sizing: border-box;
      }
      .form-input:focus {
        border-color: #f39c12;
        outline: none;
      }
      .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #f39c12, #e67e22);
        color: white;
        border: none;
        padding: 12px;
        font-size: 15px;
        font-weight: 700;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 10px;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
      }
      .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 13px;
      }
      .alert-danger {
        background: rgba(231, 76, 60, 0.2);
        border: 1px solid #e74c3c;
        color: #e74c3c;
      }
      .alert-info {
        background: rgba(52, 152, 219, 0.2);
        border: 1px solid #3498db;
        color: #3498db;
      }
    </style>
  </head>
  <body>
    <div class="reset-card">
      <div class="reset-header">
        <h2>Set Account Password</h2>
        <p>Choose a personal password for your interviewer account, then continue to the dashboard.</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'error' else 'danger' }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('interviewer_reset_password_route') }}" method="POST">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" name="password" id="password" class="form-input" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" name="confirm" id="confirm" class="form-input" required minlength="6" placeholder="Repeat new password">
        </div>
        <button type="submit" class="btn-submit">Set Password & Continue</button>
      </form>
    </div>
  </body>
</html>
